{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar foto - CHAMBA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/principal.css' %}">
    <style>
        .form-container {
            max-width: 600px;
            margin: 2rem auto;
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }
        .form-container h2 {
            color: #0A66C2;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #E8F0FE;
            padding-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #374151;
            font-size: 1.3rem;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1.5px solid #E5E7EB;
            border-radius: 0.8rem;
            font-size: 1rem;
        }
        .imagen-actual {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: #F9FAFB;
            border-radius: 0.8rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .imagen-actual img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 0.5rem;
        }
        .btn-guardar {
            background: #0A66C2;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
        }
        .btn-cancelar {
            background: #F3F4F6;
            color: #6B7280;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body class="chamba-dashboard">
    {% include 'includes/navbar.html' %}

    <div class="form-container">
        <h2><i class="fas fa-edit"></i> Editar foto del portafolio</h2>

        <div class="imagen-actual">
            <img src="{{ foto.imagen.url }}" alt="Foto actual">
            <p>Imagen actual</p>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>Título</label>
                <input type="text" name="titulo" value="{{ foto.titulo }}" placeholder="Título de la foto">
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea name="descripcion" rows="4" placeholder="Describe este trabajo...">{{ foto.descripcion }}</textarea>
            </div>
            <div class="form-group">
                <label>Cambiar imagen (opcional)</label>
                <input type="file" name="imagen" accept="image/*">
            </div>
            <button type="submit" class="btn-guardar"><i class="fas fa-save"></i> Guardar cambios</button>
            <a href="{% url 'perfil' %}" class="btn-cancelar"><i class="fas fa-times"></i> Cancelar</a>
        </form>
    </div>
</body>
</html>
