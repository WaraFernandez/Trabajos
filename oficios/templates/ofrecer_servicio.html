{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAMBA - Ofrecer servicio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/principal.css' %}">
    <!-- Leaflet CSS para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .form-container {
            max-width: 700px;
            width: 100%;
            margin: 2rem auto;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .form-header {
            padding: 1.5rem 2rem;
            background: linear-gradient(135deg, #0A66C2 0%, #004182 100%);
            color: white;
        }

        .form-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-body {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #1D1D1D;
        }

        .form-group label .required {
            color: #EF4444;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid #E5E7EB;
            border-radius: 0.8rem;
            font-size: 1.4rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #0A66C2;
            box-shadow: 0 0 0 3px rgba(10, 102, 194, 0.1);
        }

        .ubicacion-input-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .ubicacion-input-group input {
            flex: 1;
        }

        .btn-mapa {
            background: #0A66C2;
            color: white;
            border: none;
            padding: 0.8rem 1.2rem;
            border-radius: 0.8rem;
            cursor: pointer;
            font-size: 1.2rem;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-mapa:hover {
            background: #004182;
            transform: translateY(-2px);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .botones-accion {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn-submit {
            flex: 2;
            background: #0A66C2;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 2rem;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            background: #004182;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(10, 102, 194, 0.3);
        }

        .btn-cancelar {
            flex: 1;
            background: #F3F4F6;
            color: #6B7280;
            border: 1.5px solid #E5E7EB;
            padding: 1rem;
            border-radius: 2rem;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-cancelar:hover {
            background: #E5E7EB;
            color: #374151;
            transform: translateY(-2px);
        }

        .info-box {
            background: #E8F0FE;
            padding: 1rem;
            border-radius: 0.8rem;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            color: #0A66C2;
        }

        /* Modal del mapa */
        .modal-mapa {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-mapa-content {
            background: white;
            border-radius: 1.5rem;
            width: 95%;
            max-width: 800px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-mapa-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #E5E7EB;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #F8FAFC;
        }

        .modal-mapa-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0A66C2;
        }

        .modal-mapa-header button {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            border: none;
            background: #E5E7EB;
            cursor: pointer;
            font-size: 1.2rem;
        }

        #mapaSeleccion {
            flex: 1;
            width: 100%;
            min-height: 400px;
        }

        .modal-mapa-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #E5E7EB;
            display: flex;
            gap: 1rem;
            background: #F8FAFC;
        }

        .modal-mapa-footer button {
            flex: 1;
            padding: 0.7rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-confirmar {
            background: #0A66C2;
            color: white;
            border: none;
        }

        .btn-confirmar:hover {
            background: #004182;
        }

        .btn-cerrar-mapa {
            background: white;
            border: 1.5px solid #E5E7EB;
            color: #6B7280;
        }

        .ubicacion-preview {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #10B981;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        @media (max-width: 768px) {
            .form-container {
                margin: 1rem;
            }
            
            .form-header h2 {
                font-size: 1.4rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .botones-accion {
                flex-direction: column;
            }

            .btn-submit, .btn-cancelar {
                padding: 0.8rem;
                font-size: 1.3rem;
            }

            .ubicacion-input-group {
                flex-direction: column;
            }

            .btn-mapa {
                width: 100%;
            }
        }
    </style>
</head>

<body class="chamba-dashboard">

    {% include 'includes/navbar.html' %}

    <div class="form-container">
        <div class="form-header">
            <h2><i class="fa-solid fa-tools"></i> Ofrecer mi servicio</h2>
        </div>
        <div class="form-body">
            <div class="info-box">
                <i class="fa-solid fa-circle-info"></i> Completa los datos para ofrecer tu servicio. Los empleadores
                podrán contactarte.
            </div>

            <form method="post" id="servicioForm">
                {% csrf_token %}

                <div class="form-group">
                    <label>Título del servicio <span class="required">*</span></label>
                    <input type="text" name="titulo" id="titulo" placeholder="Ej: Reparación de motores a domicilio" required>
                </div>

                <div class="form-group">
                    <label>Oficio / Especialidad <span class="required">*</span></label>
                    <select name="oficio" id="oficio" required>
                        <option value="">Selecciona tu oficio</option>
                        <option value="Electricista">⚡ Electricista</option>
                        <option value="Plomero">🔧 Plomero</option>
                        <option value="Carpintero">🪵 Carpintero</option>
                        <option value="Cocinero">🍳 Cocinero</option>
                        <option value="Limpieza">🧹 Limpieza</option>
                        <option value="Construcción">🏗️ Construcción</option>
                        <option value="Pintor">🎨 Pintor</option>
                        <option value="Jardinero">🌿 Jardinero</option>
                        <option value="Mecánico">🔧 Mecánico</option>
                        <option value="Otro">📌 Otro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Descripción del servicio <span class="required">*</span></label>
                    <textarea name="descripcion" id="descripcion" rows="5"
                        placeholder="Describe tu experiencia, qué incluye el servicio, materiales, etc."
                        required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Zona de trabajo <span class="required">*</span></label>
                        <div class="ubicacion-input-group">
                            <input type="text" name="ubicacion" id="ubicacion" placeholder="Ej: Zona Sur, La Paz" required>
                            <button type="button" class="btn-mapa" onclick="abrirMapa()">
                                <i class="fa-solid fa-map-location-dot"></i> Ver en mapa
                            </button>
                        </div>
                        <div id="ubicacionPreview" class="ubicacion-preview" style="display: none;">
                            <i class="fa-solid fa-check-circle"></i> <span id="ubicacionDetalle"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Precio (Bs)</label>
                        <input type="text" name="precio" id="precio" placeholder="Ej: 150 Bs / Por negociar">
                    </div>
                </div>

                <!-- Campos ocultos para coordenadas -->
                <input type="hidden" name="latitud" id="latitud" value="">
                <input type="hidden" name="longitud" id="longitud" value="">

                <div class="botones-accion">
                    <button type="submit" class="btn-submit">
                        <i class="fa-solid fa-paper-plane"></i> Publicar servicio
                    </button>
                    <a href="{% url 'dashboard' %}" class="btn-cancelar">
                        <i class="fa-solid fa-xmark"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL DEL MAPA -->
    <div id="modalMapa" class="modal-mapa">
        <div class="modal-mapa-content">
            <div class="modal-mapa-header">
                <h3><i class="fa-solid fa-map"></i> Selecciona la ubicación exacta donde ofreces el servicio</h3>
                <button onclick="cerrarMapa()">✕</button>
            </div>
            <div id="mapaSeleccion"></div>
            <div class="modal-mapa-footer">
                <button class="btn-cerrar-mapa" onclick="cerrarMapa()">Cancelar</button>
                <button class="btn-confirmar" onclick="confirmarUbicacion()">
                    <i class="fa-solid fa-check"></i> Confirmar ubicación
                </button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Nominatim para reverse geocoding -->
    <script>
        let mapa = null;
        let marcador = null;
        let ubicacionSeleccionada = {
            lat: -16.5000,
            lng: -68.1500,
            direccion: "La Paz, Bolivia"
        };

        // Coordenadas por defecto (La Paz)
        const coordenadasPorDefecto = {
            'la paz': [-16.5000, -68.1500],
            'santa cruz': [-17.7836, -63.1821],
            'cochabamba': [-17.3895, -66.1568],
            'sucre': [-19.0333, -65.2627],
            'potosi': [-19.5836, -65.7531],
            'tarija': [-21.5355, -64.7295],
            'oruro': [-17.9667, -67.1167],
            'trinidad': [-14.8333, -64.9000],
            'cobija': [-11.0267, -68.7692],
            'el alto': [-16.5100, -68.1700]
        };

        function abrirMapa() {
            const modal = document.getElementById('modalMapa');
            modal.style.display = 'flex';
            
            // Obtener la ubicación actual del input
            const ubicacionInput = document.getElementById('ubicacion').value;
            let coordsIniciales = [-16.5000, -68.1500]; // La Paz por defecto
            
            // Intentar obtener coordenadas de la ciudad ingresada
            if (ubicacionInput) {
                const ciudadKey = ubicacionInput.toLowerCase().split(',')[0].trim();
                if (coordenadasPorDefecto[ciudadKey]) {
                    coordsIniciales = coordenadasPorDefecto[ciudadKey];
                }
            }
            
            // Inicializar el mapa si no existe
            if (!mapa) {
                mapa = L.map('mapaSeleccion').setView(coordsIniciales, 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(mapa);
                
                // Agregar marcador movible
                marcador = L.marker(coordsIniciales, { draggable: true }).addTo(mapa);
                
                // Actualizar dirección cuando se mueve el marcador
                marcador.on('dragend', function(e) {
                    const pos = marcador.getLatLng();
                    obtenerDireccion(pos.lat, pos.lng);
                });
                
                // Click en el mapa para mover el marcador
                mapa.on('click', function(e) {
                    marcador.setLatLng(e.latlng);
                    obtenerDireccion(e.latlng.lat, e.latlng.lng);
                });
            } else {
                mapa.setView(coordsIniciales, 13);
                marcador.setLatLng(coordsIniciales);
            }
            
            // Si ya hay coordenadas guardadas, usarlas
            const latGuardada = document.getElementById('latitud').value;
            const lngGuardada = document.getElementById('longitud').value;
            if (latGuardada && lngGuardada) {
                const pos = [parseFloat(latGuardada), parseFloat(lngGuardada)];
                mapa.setView(pos, 15);
                marcador.setLatLng(pos);
                obtenerDireccion(pos[0], pos[1]);
            } else if (ubicacionInput) {
                // Intentar geocodificar la ubicación ingresada
                geocodificarUbicacion(ubicacionInput);
            } else {
                obtenerDireccion(coordsIniciales[0], coordsIniciales[1]);
            }
        }
        
        function geocodificarUbicacion(direccion) {
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(direccion)}, Bolivia&limit=1`)
                .then(r => r.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const lat = parseFloat(data[0].lat);
                        const lng = parseFloat(data[0].lon);
                        mapa.setView([lat, lng], 14);
                        marcador.setLatLng([lat, lng]);
                        obtenerDireccion(lat, lng);
                    }
                })
                .catch(err => console.error('Error geocodificando:', err));
        }
        
        function obtenerDireccion(lat, lng) {
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`)
                .then(r => r.json())
                .then(data => {
                    if (data && data.display_name) {
                        // Extraer una dirección más legible
                        let direccion = data.display_name;
                        // Limitar longitud
                        if (direccion.length > 80) {
                            direccion = direccion.substring(0, 80) + '...';
                        }
                        ubicacionSeleccionada = {
                            lat: lat,
                            lng: lng,
                            direccion: direccion
                        };
                    } else {
                        ubicacionSeleccionada = {
                            lat: lat,
                            lng: lng,
                            direccion: `${lat.toFixed(6)}, ${lng.toFixed(6)}`
                        };
                    }
                })
                .catch(() => {
                    ubicacionSeleccionada = {
                        lat: lat,
                        lng: lng,
                        direccion: `${lat.toFixed(6)}, ${lng.toFixed(6)}`
                    };
                });
        }
        
        function confirmarUbicacion() {
            const pos = marcador.getLatLng();
            const lat = pos.lat.toFixed(6);
            const lng = pos.lng.toFixed(6);
            
            // Guardar coordenadas en campos ocultos
            document.getElementById('latitud').value = lat;
            document.getElementById('longitud').value = lng;
            
            // Obtener dirección completa para mostrar
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`)
                .then(r => r.json())
                .then(data => {
                    let direccionCompleta = "";
                    if (data && data.display_name) {
                        // Extraer calle, número, ciudad
                        const partes = [];
                        if (data.address.road) partes.push(data.address.road);
                        if (data.address.house_number) partes.push(data.address.house_number);
                        if (data.address.suburb) partes.push(data.address.suburb);
                        if (data.address.city || data.address.town) {
                            partes.push(data.address.city || data.address.town);
                        }
                        if (data.address.state) partes.push(data.address.state);
                        direccionCompleta = partes.join(', ');
                        if (!direccionCompleta) direccionCompleta = data.display_name.split(',')[0];
                    }
                    
                    if (!direccionCompleta) {
                        direccionCompleta = `${lat}, ${lng}`;
                    }
                    
                    // Actualizar el campo de ubicación con la dirección encontrada
                    document.getElementById('ubicacion').value = direccionCompleta;
                    
                    // Mostrar preview
                    const preview = document.getElementById('ubicacionPreview');
                    const detalle = document.getElementById('ubicacionDetalle');
                    detalle.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${direccionCompleta} (coords: ${lat}, ${lng})`;
                    preview.style.display = 'block';
                    
                    // Cerrar modal
                    cerrarMapa();
                    
                    // Mostrar mensaje de éxito
                    const infoBox = document.querySelector('.info-box');
                    const originalHTML = infoBox.innerHTML;
                    infoBox.innerHTML = '<i class="fa-solid fa-check-circle"></i> ¡Ubicación seleccionada correctamente! El mapa guardará las coordenadas exactas.';
                    infoBox.style.background = '#10B981';
                    infoBox.style.color = 'white';
                    setTimeout(() => {
                        infoBox.innerHTML = originalHTML;
                        infoBox.style.background = '#E8F0FE';
                        infoBox.style.color = '#0A66C2';
                    }, 3000);
                })
                .catch(() => {
                    document.getElementById('ubicacion').value = `${lat}, ${lng}`;
                    const preview = document.getElementById('ubicacionPreview');
                    const detalle = document.getElementById('ubicacionDetalle');
                    detalle.innerHTML = `<i class="fa-solid fa-location-dot"></i> Coordenadas: ${lat}, ${lng}`;
                    preview.style.display = 'block';
                    cerrarMapa();
                });
        }
        
        function cerrarMapa() {
            const modal = document.getElementById('modalMapa');
            modal.style.display = 'none';
        }
        
        // Cerrar modal al hacer clic fuera
        document.getElementById('modalMapa')?.addEventListener('click', function(e) {
            if (e.target === this) cerrarMapa();
        });
        
        // Al enviar el formulario, asegurar que se guarden las coordenadas
        document.getElementById('servicioForm')?.addEventListener('submit', function(e) {
            const lat = document.getElementById('latitud').value;
            const lng = document.getElementById('longitud').value;
            const ubicacion = document.getElementById('ubicacion').value;
            
            if (!ubicacion) {
                e.preventDefault();
                alert('Por favor selecciona una ubicación usando el mapa');
                return;
            }
            
            // Si no hay coordenadas pero sí ubicación, intentar geocodificar
            if ((!lat || !lng) && ubicacion) {
                e.preventDefault();
                // Mostrar mensaje para que use el mapa
                alert('Por favor usa el botón "Ver en mapa" para seleccionar la ubicación exacta');
                abrirMapa();
            }
        });
    </script>
</body>

</html>
