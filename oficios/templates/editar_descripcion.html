{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar experiencia - CHAMBA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/principal.css' %}">
    <style>
        .form-container { max-width: 500px; margin: 2rem auto; background: white; border-radius: 1.5rem; padding: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); text-align: center; }
        .form-container h2 { color: #0A66C2; margin-bottom: 1rem; }
        input { width: 150px; padding: 1rem; border: 1.5px solid #E5E7EB; border-radius: 1rem; font-size: 1.5rem; text-align: center; }
        input:focus { outline: none; border-color: #0A66C2; }
        .btn-guardar { background: #0A66C2; color: white; border: none; padding: 0.8rem 2rem; border-radius: 2rem; cursor: pointer; font-weight: 600; margin-top: 1rem; }
        .btn-cancelar { background: #F3F4F6; color: #6B7280; border: none; padding: 0.8rem 2rem; border-radius: 2rem; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; margin-left: 1rem; }
    </style>
</head>
<body style="background: #F3F4F6; min-height: 100vh;">
    <div class="form-container">
        <h2><i class="fas fa-chart-line"></i> Editar años de experiencia</h2>
        <form method="post">
            {% csrf_token %}
            <input type="number" name="anios_experiencia" min="0" max="50" value="{{ anios_actual }}">
            <div style="margin-top: 1rem;">
                <button type="submit" class="btn-guardar"><i class="fas fa-save"></i> Guardar</button>
                <a href="{% url 'perfil' %}" class="btn-cancelar"><i class="fas fa-times"></i> Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
