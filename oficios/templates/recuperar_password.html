{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - CHAMBA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        /* Estilos adicionales solo para esta página */
        .instrucciones-box {
            background: #F0F7FF;
            border-radius: 1rem;
            padding: 1rem;
            margin: 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-left: 4px solid #0A66C2;
        }

        .instrucciones-box i {
            font-size: 2rem;
            color: #0A66C2;
        }

        .instrucciones-box p {
            margin: 0;
            font-size: 0.85rem;
            color: #1F2937;
            line-height: 1.4;
        }

        .email-icon {
            background: linear-gradient(135deg, #0A66C2 0%, #004182 100%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .email-icon i {
            font-size: 1.8rem;
            color: white;
        }

        .highlight {
            color: #0A66C2;
            font-weight: 700;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            font-size: 1.1rem;
        }

        .input-icon input {
            padding-left: 2.8rem !important;
        }
    </style>
</head>

<body class="body-login">
    <div class="celular">
        <div class="contenedor">
            <a href="/login/" class="auth-back">
                <i class="fas fa-arrow-left"></i> Volver al inicio
            </a>

            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <img src="{% static 'img/logochamba.png' %}" alt="CHAMBA" style="height: 150px; width: auto;">
                    </div>

                    <div class="email-icon">
                        <i class="fas fa-envelope-open-text"></i>
                    </div>

                    <h2 class="auth-title">¿Olvidaste tu contraseña?</h2>
                    <p class="auth-sub">No te preocupes, te ayudamos a recuperarla</p>
                </div>

                

                <form method="post">
                    {% csrf_token %}
                    <div class="auth-form-group">
                        <label class="auth-label">Correo electrónico</label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" name="email" class="auth-input" placeholder="tu@email.com" required>
                        </div>
                    </div>

                    <button type="submit" class="auth-btn">
                        <i class="fas fa-paper-plane"></i> Enviar instrucciones
                    </button>
                </form>

                <div class="auth-footer">
                    <p style="margin-bottom: 0.5rem;">¿Recordaste tu contraseña?</p>
                    <a href="{% url 'login' %}">Volver al inicio de sesión</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
